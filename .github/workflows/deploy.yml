name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.polybazar.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render (Staging)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_BACKEND: ${{ secrets.RENDER_STAGING_BACKEND_SERVICE_ID }}
          RENDER_SERVICE_ID_FRONTEND: ${{ secrets.RENDER_STAGING_FRONTEND_SERVICE_ID }}
          RENDER_SERVICE_ID_ML: ${{ secrets.RENDER_STAGING_ML_SERVICE_ID }}
        run: |
          # Trigger Render deployments
          for SERVICE_ID in $RENDER_SERVICE_ID_BACKEND $RENDER_SERVICE_ID_FRONTEND $RENDER_SERVICE_ID_ML; do
            curl -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json"
          done

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          curl -f https://staging-api.polybazar.com/health || exit 1
          curl -f https://staging.polybazar.com || exit 1
        continue-on-error: true

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    needs: deploy-staging
    environment:
      name: production
      url: https://polybazar.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to DigitalOcean App Platform
        uses: digitalocean/app_action@v1.1.5
        with:
          app_name: polybazar-backend
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

      - name: Deploy ML Service to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_PROD_ML_SERVICE_ID }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json"

      - name: Production health check
        run: |
          sleep 120
          curl -f https://api.polybazar.com/health || exit 1
          curl -f https://polybazar.com || exit 1
          curl -f https://ml.polybazar.com/health || exit 1

      - name: Notify Slack on success
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: '🚀 Production deployment successful!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: success()

      - name: Notify Slack on failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: '❌ Production deployment failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: failure()

  # Database Migrations
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event.inputs.environment == 'production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PostgreSQL migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          # Using Flyway for migrations
          docker run --rm \
            -v $(pwd)/backend/src/main/resources/db/migration:/flyway/sql \
            flyway/flyway:latest \
            -url="${DATABASE_URL}" \
            -user="${{ secrets.PROD_DB_USER }}" \
            -password="${{ secrets.PROD_DB_PASSWORD }}" \
            migrate

      - name: Run MongoDB migrations
        env:
          MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
        run: |
          docker run --rm \
            -v $(pwd)/scripts:/scripts \
            mongo:7 \
            mongosh "${MONGODB_URI}" /scripts/init-mongo.js
        continue-on-error: true
